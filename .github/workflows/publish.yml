name: release

# Auto-bumps the patch version, tags, and publishes to PyPI on every push to main.
# Uses PyPI Trusted Publishing (OIDC) -- no API tokens in secrets.
#
# Skips itself when the pushed commit was the bot's own version-bump commit,
# so we don't loop.

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    # Release gate: tests must pass. Lint/format/type are enforced in ci.yml
    # on PRs -- keeping them out of the release path so style issues never
    # block a publish.
    if: "!contains(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tests
        run: pytest -q

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write      # push the bump commit + tag
      id-token: write      # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version
        id: bump
        run: |
          python -m pip install --upgrade pip tomlkit
          python - <<'PY'
          import os, re, pathlib, tomlkit
          p = pathlib.Path("pyproject.toml")
          doc = tomlkit.parse(p.read_text())
          current = str(doc["project"]["version"])
          # Strip any prerelease/dev suffix (0.6.0a6 -> 0.6.0) then bump patch.
          m = re.match(r"^(\d+)\.(\d+)\.(\d+)", current)
          if not m:
              raise SystemExit(f"cannot parse version: {current!r}")
          major, minor, patch = map(int, m.groups())
          has_prerelease = len(current) > m.end()
          new = f"{major}.{minor}.{patch}" if has_prerelease else f"{major}.{minor}.{patch + 1}"
          doc["project"]["version"] = new
          p.write_text(tomlkit.dumps(doc))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new}\n")
          print(f"{current} -> {new}")
          PY

      - name: Commit, tag, and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --follow-tags

      - name: Build sdist and wheel
        run: |
          pip install --upgrade build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          files: dist/*
          generate_release_notes: true
